name: Deploy to GitHub Pages NOW

on:
  push:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > config.js << 'TMPL'
          const ENV = {
            CLOUD_STORAGE_BIN_ID: '__BIN_ID__',
            CLOUD_STORAGE_API_KEY: '__API_KEY__',
            CLOUD_STORAGE_BASE_URL: '__BASE_URL__',
          };
          TMPL
          sed -i "s|__BIN_ID__|${{ secrets.CLOUD_STORAGE_BIN_ID }}|g" config.js
          sed -i "s|__API_KEY__|${{ secrets.CLOUD_STORAGE_API_KEY }}|g" config.js
          sed -i "s|__BASE_URL__|${{ secrets.CLOUD_STORAGE_BASE_URL }}|g" config.js

      - name: Include config.js in deployment
        run: sed -i '/config\.js/d' .gitignore

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
